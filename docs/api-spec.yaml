          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Không có scope `user:manage_role`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User không tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ═══ SERVERS ═══
  /servers:
    post:
      tags: [Servers]
      summary: Tạo server mới
      description: |
        Tạo 1 server với đầy đủ thông tin.
        **Scope:** `server:create`
        **Role:** Admin only
      operationId: createServer
      security:
        - BearerAuth: [server:create]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServerRequest'
      responses:
        '201':
          description: Server đã tạo thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ServerResponse'
        '400':
          description: Request body không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Thiếu JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Không có scope `server:create`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: server_id hoặc server_name đã tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: "Validation field (VD: sai format ipv4)"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags: [Servers]
      summary: Lấy danh sách server (filter, sort, paging)
      description: |
        **Scope:** `server:list`
      operationId: listServers
      security:
        - BearerAuth: [server:list]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [ON, OFF, UNKNOWN]
          description: Lọc theo trạng thái
        - name: server_name
          in: query
          schema:
            type: string
          description: Tìm kiếm theo tên server (LIKE %value%)
        - name: ipv4
          in: query
          schema:
            type: string
          description: Lọc theo IPv4
        - name: location
          in: query
          schema:
            type: string
          description: Lọc theo vị trí
        - name: os
          in: query
          schema:
            type: string
          description: Lọc theo hệ điều hành
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [server_id, server_name, status, ipv4, location, created_at, updated_at]
            default: created_at
          description: Trường sắp xếp
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Thứ tự sắp xếp
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Trang hiện tại
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Số lượng server mỗi trang
      responses:
        '200':
          description: Danh sách server
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ServerListResponse'
        '401':
          description: Thiếu JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Không có scope `server:view`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /servers/stats:
    get:
      tags: [Servers]
      summary: Số lượng server theo trạng thái hiện tại
      description: |
        Phục vụ dashboard realtime. Cache 10 giây.

        Khác với `servers_on_at_end_at` trong báo cáo: endpoint này trả số ON/OFF
        **hiện tại**, còn báo cáo trả số **tại cuối kỳ report**.

        **Scope:** `server:stats`
      operationId: getServerStats
      security:
        - BearerAuth: [server:stats]
      responses:
        '200':
          description: Thống kê trạng thái
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          total:
                            type: integer
                            example: 10000
                          on:
                            type: integer
                            example: 9940
                          off:
                            type: integer
                            example: 58
                          unknown:
                            type: integer
                            example: 2
        '401':
          description: Thiếu JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /servers/uptime:
    get:
      tags: [Servers]
      summary: Uptime của NGÀY HÔM NAY (giờ VN) cho toàn bộ fleet
      description: |
        Phục vụ dashboard realtime. Cache 10 giây (`server:uptime:cache`).

        Số liệu lấy từ bộ đếm Redis mà Lua script cập nhật ngay trong mỗi lượt ping,
        nên endpoint trả lời được **mọi lúc** — kể cả với fleet vừa khởi động 5 phút.
        Không lệnh Redis nào scale theo số server (`ZCOUNT` / `ZRANGE`), nên nó trả
        lời trong khoảng 0,1 giây với 10.000 server.

        **Kỳ là NGÀY HIỆN TẠI theo `Asia/Ho_Chi_Minh`, tự reset lúc nửa đêm.** Đây là
        con số **khác** với `GET /reports/summary`: báo cáo đọc `daily_snapshots` (các
        ngày đã kết thúc), endpoint này đọc Redis (chỉ hôm nay).

        `servers_no_data` = `total_servers` − số server đã được chấm điểm. Server vừa
        tạo chưa qua vòng ping nào được **đếm riêng**, không bị coi là uptime 0%.

        `avg_uptime_pct` là trung bình các phần trăm **từng server** (không phải
        `Σon / Σtotal` toàn hệ thống) — cùng định nghĩa với `avg_uptime_pct` của báo cáo.

        **Scope:** `server:stats`
      operationId: getServerUptime
      security:
        - BearerAuth: [server:stats]
      responses:
        '200':
          description: Uptime hôm nay
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UptimeResponse'
        '401':
          description: Thiếu JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Thiếu scope `server:stats`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /servers/{server_id}:
    get:
      tags: [Servers]
      summary: Xem chi tiết 1 server
      description: |
        **Scope:** `server:view`
        **Role:** Admin, Operator, Viewer
      operationId: getServer
      security:
        - BearerAuth: [server:view]
      parameters:
        - name: server_id
          in: path
          required: true
          schema:
            type: string
          example: SRV-00001
      responses:
        '200':
          description: Chi tiết server
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ServerResponse'
        '401':
          description: Thiếu JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Không có scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Server không tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Servers]
      summary: Cập nhật thông tin server
      description: |
        Cập nhật thông tin 1 server. **Không cho phép cập nhật `server_id`.**
        **Scope:** `server:update`
        **Role:** Admin, Operator
      operationId: updateServer
      security:
        - BearerAuth: [server:update]
      parameters:
        - name: server_id
          in: path
          required: true
          schema:
            type: string
          example: SRV-00001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateServerRequest'
      responses:
        '200':
          description: Server sau khi cập nhật
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ServerResponse'
        '400':
          description: Request body không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Thiếu JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Không có scope `server:update`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Server không tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: server_name đã tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Servers]
      summary: Xóa server (soft delete)
      description: |
        **Scope:** `server:delete`
        **Role:** Admin only
      operationId: deleteServer
      security:
        - BearerAuth: [server:delete]
      parameters:
        - name: server_id
          in: path
          required: true
          schema:
            type: string
          example: SRV-00001
      responses:
        '200':
          description: Đã xóa thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          server_id:
                            type: string
                          message:
                            type: string
                            example: "Server deleted successfully"
        '401':
          description: Thiếu JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Không có scope `server:delete`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Server không tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ═══ IMPORT / EXPORT ═══
  /servers/import:
    post:
      tags: [Import/Export]
      summary: Import danh sách server từ file Excel
      description: |
        Upload file .xlsx. Xử lý **đồng bộ** trong một request, tối đa 10.000 dòng.

        Lỗi cấp file (không phải .xlsx, sai template, vượt 10.000 dòng) reject
        toàn bộ. Lỗi cấp dòng chỉ loại dòng đó — các dòng hợp lệ vẫn được import.

        Kết quả chia ba nhóm: `succeeded`, `failed` (kèm số dòng và lý do), và
        `skipped_duplicate` (trùng `server_id`/`server_name`, trong file hoặc DB).

        **Scope:** `server:import`
        **Header bắt buộc:** `Idempotency-Key`
      operationId: importServers
      security:
        - BearerAuth: [server:import]
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: Gửi lại cùng key và cùng file sẽ trả lại response cũ, không import lần hai.
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: File Excel .xlsx theo template 10 cột
      responses:
        '200':
          description: Import hoàn tất (kể cả khi có dòng lỗi)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ImportResult'
                      meta:
                        $ref: '#/components/schemas/MetaInfo'
        '400':
          description: Thiếu file hoặc thiếu `Idempotency-Key`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: '`Idempotency-Key` đã dùng với nội dung khác'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 'File bị reject: `SERVER_IMPORT_FILE_REJECTED`'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /servers/export:
    post:
      tags: [Import/Export]
      summary: Export danh sách server ra file Excel
      description: |
        Trả về file .xlsx. Có filter, sort tùy chọn.
        **Scope:** `server:export`
        **Role:** Admin only
      operationId: exportServers
      security:
        - BearerAuth: [server:export]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
      responses:
        '200':
          description: File Excel (binary stream)
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
          headers:
            Content-Disposition:
              description: 'attachment; filename="servers_export_20260610.xlsx"'
              schema:
                type: string
        '401':
          description: Thiếu JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Không có scope `server:export`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ═══ MONITOR ═══
  # Monitoring không có public endpoint. Người dùng xem trạng thái mới nhất qua
  # GET /servers (status đọc từ PostgreSQL) và GET /servers/stats.

  /reports/summary:
    get:
      tags: [Reports]
      summary: Xem tóm tắt báo cáo (không gửi email)
      description: |
        **Scope:** `report:view`
        **Role:** Admin, Operator, Viewer
      operationId: getReportSummary
      security:
        - BearerAuth: [report:view]
      parameters:
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-06-01"
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-06-09"
      responses:
        '200':
          description: Dữ liệu báo cáo
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReportSummaryResponse'
        '400':
          description: Thiếu hoặc sai định dạng start_date/end_date
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Thiếu JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Không có scope `report:view`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reports:
    post:
      tags: [Reports]
      summary: Gửi báo cáo chủ động qua Email
      description: |
        **Scope:** `report:send`
        **Role:** Admin only
      operationId: sendReport
      security:
        - BearerAuth: [report:send]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendReportRequest'
      responses:
        '200':
          description: Báo cáo đã gửi email thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReportJob'
        '400':
          description: Thiếu hoặc sai định dạng input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Thiếu JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Không có scope `report:send`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi gửi email (SMTP fail)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reports/{id}:
    get:
      tags: [Reports]
      summary: Xem một report job
      description: |
        Trả về trạng thái job và bản báo cáo đã sinh.

        State `delivery_unknown` nghĩa là kết nối SMTP đứt sau khi body đã lên
        dây — không biết email đã đến hay chưa. **Không retry mù**: tra
        `smtp_message_id` trong hộp thư Sent trước, nếu cần gửi lại thì tạo job
        mới với `Idempotency-Key` mới.

        **Scope:** `report:view_detail`
      operationId: getReport
      security:
        - BearerAuth: [report:view_detail]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Report job
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReportJob'
        '404':
          description: Không tìm thấy job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
