services:
  # ═══════════════════════════════════════
  # Infrastructure
  # ═══════════════════════════════════════
  
  postgres:
    image: postgres:17-alpine
    container_name: vcs-sms-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vcs_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_secret}
      POSTGRES_DB: ${POSTGRES_DB:-vcs_sms}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployments/docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./deployments/docker/postgres/init-v2.sql:/docker-entrypoint-initdb.d/02-init-v2.sql
      - ./deployments/docker/postgres/seed_10k_servers.sql:/docker-entrypoint-initdb.d/03-seed.sql:ro
      - ./deployments/docker/postgres/seed_10k_servers.sql:/seed/seed_10k_servers.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vcs_admin} -d ${POSTGRES_DB:-vcs_sms}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vcs-network

  redis:
    image: redis:8-alpine
    container_name: vcs-sms-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vcs-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: vcs-sms-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=vcs-sms-cluster
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - vcs-network

  # ═══════════════════════════════════════
  # TCP Simulator (Fake 10.000 Servers)
  # ═══════════════════════════════════════

  tcp-simulator:
    build:
      context: .
      dockerfile: tcp-simulator/Dockerfile
    container_name: vcs-sms-tcp-simulator
    networks:
      - vcs-network
    environment:
      - SIMULATOR_BASE_PORT=9001
      - SIMULATOR_NUM_SERVERS=10000
      - SIMULATOR_TICK_INTERVAL=30s
      - SIMULATOR_DEFAULT_UPTIME_RATE=0.95
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9001"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════
  # Application Services (commented out in dev)
  # ═══════════════════════════════════════

  traefik:
    image: traefik:v3.0
    container_name: vcs-sms-traefik
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    volumes:
      - ./deployments/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./deployments/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./logs/traefik:/var/log/traefik
    depends_on:
      auth-service:
        condition: service_started
      server-service:
        condition: service_started
      report-service:
        condition: service_started
    networks:
      - vcs-network

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: vcs-sms-auth
    ports:
      - "${AUTH_PORT:-8081}:8081"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs/auth:/var/log/vcs-sms
    networks:
      - vcs-network

  server-service:
    build:
      context: .
      dockerfile: server-service/Dockerfile
    container_name: vcs-sms-server
    ports:
      - "${SERVER_PORT:-8082}:8082"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs/server:/var/log/vcs-sms
    networks:
      - vcs-network

  monitor-service:
    build:
      context: .
      dockerfile: monitor-service/Dockerfile
    container_name: vcs-sms-monitor
    ports:
      - "${MONITOR_PORT:-8083}:8083"
    env_file:
      - .env
    environment:
      - MONITOR_TCP_DIAL_HOST=tcp-simulator
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      tcp-simulator:
        condition: service_healthy
    volumes:
      - ./logs/monitor:/var/log/vcs-sms
    networks:
      - vcs-network

  report-service:
    build:
      context: .
      dockerfile: report-service/Dockerfile
    container_name: vcs-sms-report
    ports:
      - "${REPORT_PORT:-8084}:8084"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./logs/report:/var/log/vcs-sms
    networks:
      - vcs-network

  fileio-service:
    build:
      context: .
      dockerfile: fileio-service/Dockerfile
    container_name: vcs-sms-fileio
    ports:
      - "${FILEIO_PORT:-8085}:8085"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs/fileio:/var/log/vcs-sms
      - ./uploads:/app/uploads
    networks:
      - vcs-network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: "${WEB_API_BASE_URL:-http://localhost:8080/api/v1}"
    container_name: vcs-sms-web
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      traefik:
        condition: service_started
    networks:
      - vcs-network

volumes:
  postgres_data:
  redis_data:
  es_data:

networks:
  vcs-network:
    driver: bridge
