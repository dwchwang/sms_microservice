services:
  # ═══════════════════════════════════════
  # Infrastructure
  # ═══════════════════════════════════════
  
  postgres:
    image: postgres:17-alpine
    container_name: vcs-sms-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vcs_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_secret}
      POSTGRES_DB: ${POSTGRES_DB:-vcs_sms}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployments/docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      # Not auto-run: 10.000 rows are for load testing only. Use `make seed`,
      # then `make rebuild-cache` so Monitoring can see the targets.
      - ./deployments/docker/postgres/seed_10k_servers.sql:/seed/seed_10k_servers.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vcs_admin} -d ${POSTGRES_DB:-vcs_sms}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vcs-network

  redis:
    image: redis:8-alpine
    container_name: vcs-sms-redis
    # volatile-lru, not allkeys-lru: only the cache carries a TTL. The lifetime
    # uptime counters, monitor status, target projection and the status stream
    # have none, and evicting any of them loses data that cannot be recomputed.
    # AOF keeps the counters across a restart.
    command: >
      redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
      --maxmemory 512mb --maxmemory-policy volatile-lru
      --appendonly yes --appendfsync everysec
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vcs-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: vcs-sms-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=vcs-sms-cluster
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - vcs-network

  # ═══════════════════════════════════════
  # TCP Simulator (Fake 10.000 Servers)
  # ═══════════════════════════════════════

  tcp-simulator:
    build:
      context: .
      dockerfile: tcp-simulator/Dockerfile
    container_name: vcs-sms-tcp-simulator
    networks:
      - vcs-network
    environment:
      - SIMULATOR_BASE_PORT=9001
      - SIMULATOR_NUM_SERVERS=10000
      - SIMULATOR_TICK_INTERVAL=30s
      - SIMULATOR_DEFAULT_UPTIME_RATE=0.75
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9001"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════
  # Application Services
  # ═══════════════════════════════════════

  traefik:
    image: traefik:v3.0
    container_name: vcs-sms-traefik
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    volumes:
      - ./deployments/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./deployments/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./logs/traefik:/var/log/traefik
    depends_on:
      auth-service:
        condition: service_started
      server-service:
        condition: service_started
      report-service:
        condition: service_started
    networks:
      - vcs-network

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: vcs-sms-auth
    # Traefik only: the ForwardAuth headers are trusted, so direct access would bypass auth.
    expose:
      - "8081"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs/auth:/var/log/vcs-sms
    networks:
      - vcs-network

  server-service:
    build:
      context: .
      dockerfile: server-service/Dockerfile
    container_name: vcs-sms-server
    expose:
      - "8082"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs/server:/var/log/vcs-sms
    networks:
      - vcs-network

  monitor-service:
    build:
      context: .
      dockerfile: monitor-service/Dockerfile
    container_name: vcs-sms-monitor
    expose:
      - "8083"
    env_file:
      - .env
    environment:
      - MONITOR_TCP_DIAL_HOST=tcp-simulator
    # No postgres: Monitoring reads the Redis target projection and writes
    # Redis status plus Elasticsearch facts.
    depends_on:
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      tcp-simulator:
        condition: service_healthy
    volumes:
      - ./logs/monitor:/var/log/vcs-sms
    networks:
      - vcs-network

  report-service:
    build:
      context: .
      dockerfile: report-service/Dockerfile
    container_name: vcs-sms-report
    expose:
      - "8084"
    env_file:
      - .env
    # The snapshot job reads the population from Server Service.
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      server-service:
        condition: service_started
    volumes:
      - ./logs/report:/var/log/vcs-sms
    networks:
      - vcs-network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: "${WEB_API_BASE_URL:-http://localhost:8080/api/v1}"
    container_name: vcs-sms-web
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      traefik:
        condition: service_started
    networks:
      - vcs-network

volumes:
  postgres_data:
  redis_data:
  es_data:

networks:
  vcs-network:
    driver: bridge
