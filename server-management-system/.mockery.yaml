# ── .mockery.yaml ──
# Mockery config for VCS-SMS
# Usage: make mocks
#
# Most tests use hand-written fakes rather than generated mocks; only add a
# package here when a generated mock is actually imported.

with-expecter: true
packages:
  github.com/vcs-sms/auth-service/internal/repository:
    config:
      dir: "{{.InterfaceDir}}/mocks"
      filename: "{{.InterfaceName}}_mock.go"
      outpkg: "mocks"
    interfaces:
      UserRepository:
  github.com/vcs-sms/server-service/internal/repository:
    config:
      dir: "{{.InterfaceDir}}/mocks"
      filename: "{{.InterfaceName}}_mock.go"
      outpkg: "mocks"
    interfaces:
      ServerRepository:
      IdempotencyRepository:
