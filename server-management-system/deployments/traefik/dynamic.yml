http:
  # ============================================
  # Middlewares
  # ============================================
  middlewares:
    # CORS. Phải đứng TRƯỚC forward-auth trong chuỗi: preflight OPTIONS không mang
    # Authorization, nên forward-auth sẽ trả 401 và trình duyệt chặn mọi request.
    # Traefik trả lời preflight ngay tại đây, không forward xuống service.
    cors:
      headers:
        accessControlAllowOriginList:
          - "http://localhost:3000"
        accessControlAllowMethods:
          - "GET"
          - "POST"
          - "PUT"
          - "DELETE"
          - "OPTIONS"
        accessControlAllowHeaders:
          - "Authorization"
          - "Content-Type"
          - "Idempotency-Key"
        # Export đọc tên file từ header này.
        accessControlExposeHeaders:
          - "Content-Disposition"
        accessControlMaxAge: 3600
        addVaryHeader: true

    # ForwardAuth -> Identity Service
    forward-auth:
      forwardAuth:
        address: "http://auth-service:8081/internal/verify"
        authResponseHeaders:
          - "X-User-Id"
          - "X-User-Scopes"
          - "X-User-Email"
        authResponseHeadersRegex: "^X-"

    # Rate limit global
    rate-limit-global:
      rateLimit:
        average: 100
        burst: 200
        period: "1s"

    # Rate limit cho auth endpoints (chặt hơn)
    rate-limit-auth:
      rateLimit:
        average: 10
        burst: 20
        period: "1s"

  # ============================================
  # Routers
  # ============================================
  routers:
    server-import:
      rule: "Path(`/api/v1/servers/import`)"
      priority: 100
      service: server-service-import
      middlewares:
        - cors
        - forward-auth
        - rate-limit-global

    server-api:
      rule: "PathPrefix(`/api/v1/servers`)"
      service: server-service
      middlewares:
        - cors
        - forward-auth
        - rate-limit-global

    report-api:
      rule: "PathPrefix(`/api/v1/reports`)"
      service: report-service
      middlewares:
        - cors
        - forward-auth
        - rate-limit-global

    auth-api:
      rule: "PathPrefix(`/api/v1/auth`)"
      service: auth-service
      middlewares:
        - cors
        - rate-limit-auth

  # ============================================
  # Services
  # ============================================
  services:
    server-service:
      loadBalancer:
        servers:
          - url: "http://server-service:8082"
    server-service-import:
      loadBalancer:
        serversTransport: import-transport
        servers:
          - url: "http://server-service:8082"
    report-service:
      loadBalancer:
        servers:
          - url: "http://report-service:8084"
    auth-service:
      loadBalancer:
        servers:
          - url: "http://auth-service:8081"

  # ============================================
  # Transports
  # ============================================
  serversTransports:
    import-transport:
      forwardingTimeouts:
        responseHeaderTimeout: 120s
