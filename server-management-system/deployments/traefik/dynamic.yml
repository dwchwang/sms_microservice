http:
  # ============================================
  # Middlewares
  # ============================================
  middlewares:
    # ForwardAuth -> Identity Service
    forward-auth:
      forwardAuth:
        address: "http://auth-service:8081/internal/verify"
        authResponseHeaders:
          - "X-User-Id"
          - "X-User-Scopes"
          - "X-User-Email"
        authResponseHeadersRegex: "^X-"

    # Rate limit global
    rate-limit-global:
      rateLimit:
        average: 100
        burst: 200
        period: "1s"

    # Rate limit cho auth endpoints (chặt hơn)
    rate-limit-auth:
      rateLimit:
        average: 10
        burst: 20
        period: "1s"

  # ============================================
  # Routers
  # ============================================
  routers:
    # Import is synchronous and may run ~8s for 10.000 rows, so it gets its own
    # transport with a longer header timeout. Path() outranks the PathPrefix
    # rule below, so this wins for the import URL only.
    server-import:
      rule: "Path(`/api/v1/servers/import`)"
      priority: 100
      service: server-service-import
      middlewares:
        - forward-auth
        - rate-limit-global

    server-api:
      rule: "PathPrefix(`/api/v1/servers`)"
      service: server-service
      middlewares:
        - forward-auth
        - rate-limit-global

    report-api:
      rule: "PathPrefix(`/api/v1/reports`)"
      service: report-service
      middlewares:
        - forward-auth
        - rate-limit-global

    auth-api:
      rule: "PathPrefix(`/api/v1/auth`)"
      service: auth-service
      middlewares:
        - rate-limit-auth

  # ============================================
  # Services
  # ============================================
  services:
    server-service:
      loadBalancer:
        servers:
          - url: "http://server-service:8082"
    server-service-import:
      loadBalancer:
        serversTransport: import-transport
        servers:
          - url: "http://server-service:8082"
    report-service:
      loadBalancer:
        servers:
          - url: "http://report-service:8084"
    auth-service:
      loadBalancer:
        servers:
          - url: "http://auth-service:8081"

  # ============================================
  # Transports
  # ============================================
  serversTransports:
    import-transport:
      forwardingTimeouts:
        responseHeaderTimeout: 120s
